<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dairy Distribution Manager</title>
<style>
  :root{
    --bg:#F6F4EE; --surface:#FFFFFF; --ink:#1F2A24; --muted:#726B5D;
    --primary:#2F6B4F; --primary-dark:#1B4330; --primary-light:#E6F0EA;
    --gold:#C08F2E; --gold-light:#FBF1DD; --danger:#B23A2E; --danger-light:#FBEAE7;
    --border:#E4DFD2; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh;}
  .sidebar{width:230px;background:var(--primary-dark);color:#fff;display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
  .brand{display:flex;align-items:center;gap:10px;padding:0 20px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:12px;}
  .brand-mark{width:30px;height:30px;flex-shrink:0;}
  .brand-text{font-weight:700;font-size:15.5px;line-height:1.2;}
  .brand-text small{display:block;font-weight:400;font-size:11px;opacity:0.65;}
  nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
  nav button{display:flex;align-items:center;gap:10px;background:none;border:none;color:rgba(255,255,255,0.78);padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:background .15s,color .15s;}
  nav button svg{width:16px;height:16px;flex-shrink:0;opacity:0.85;}
  nav button:hover{background:rgba(255,255,255,0.08);color:#fff;}
  nav button.active{background:var(--primary);color:#fff;}
  .main{flex:1;padding:28px 34px;overflow-x:auto;}
  .page-header{margin-bottom:22px;}
  .page-header h1{font-size:21px;margin:0 0 4px 0;}
  .page-header p{margin:0;color:var(--muted);font-size:13.5px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:26px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
  .card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px;}
  .card .value{font-size:20px;font-weight:700;color:var(--primary-dark);}
  .card .value.gold{color:var(--gold);}
  .card .value.danger{color:var(--danger);}
  .card .sub{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
  .panel h2{font-size:15.5px;margin:0 0 14px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .panel h2 .toggle-btn{font-size:12.5px;font-weight:600;color:var(--primary);background:var(--primary-light);border:none;padding:6px 12px;border-radius:7px;cursor:pointer;}
  .panel h2 .toggle-btn:hover{background:#d9ecdf;}
  form.inline-form{display:none;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;padding:16px;background:var(--bg);border-radius:8px;border:1px dashed var(--border);}
  form.inline-form.open{display:grid;}
  form.inline-form .full{grid-column:1/-1;}
  label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px;}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13.5px;font-family:inherit;background:#fff;color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);}
  .form-actions{grid-column:1/-1;display:flex;gap:10px;margin-top:2px;}
  button.primary{background:var(--primary);color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:13.5px;font-weight:600;cursor:pointer;}
  button.primary:hover{background:var(--primary-dark);}
  button.ghost{background:none;border:1px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:7px;font-size:13.5px;cursor:pointer;}
  button.ghost:hover{background:var(--bg);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:9px 10px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:2px solid var(--border);white-space:nowrap;}
  td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--bg);}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
  .pill.paid{background:var(--primary-light);color:var(--primary-dark);}
  .pill.due{background:var(--danger-light);color:var(--danger);}
  .pill.warn{background:var(--gold-light);color:var(--gold);}
  .empty{color:var(--muted);font-size:13px;padding:22px 10px;text-align:center;}
  .item-row{display:grid;grid-template-columns:1.4fr 1.4fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:end;}
  .item-row.bill{grid-template-columns:1.6fr 1fr 1fr auto;}
  .remove-item{background:var(--danger-light);color:var(--danger);border:none;border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:15px;}
  .bill-total{font-size:14px;font-weight:700;color:var(--primary-dark);text-align:right;margin-top:6px;}
  .link-btn{background:none;border:none;color:var(--primary);font-weight:600;font-size:12px;cursor:pointer;padding:0;}
  .link-btn:hover{text-decoration:underline;}
  .link-btn.danger{color:var(--danger);}
  .gauge-wrap{display:flex;align-items:center;gap:18px;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--primary-dark);color:#fff;padding:12px 18px;border-radius:8px;font-size:13.5px;box-shadow:0 6px 20px rgba(0,0,0,0.18);opacity:0;transform:translateY(10px);transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}
  .ledger-select{max-width:280px;margin-bottom:18px;}
  .balance-banner{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .trip-card{border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-bottom:14px;}
  .trip-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
  .trip-card-head .who{font-weight:700;font-size:14px;}
  .trip-card-head .when{color:var(--muted);font-size:12px;}
  .small-input{width:70px;padding:5px 7px;font-size:12.5px;}
  .stock-grid-table td.avail{font-weight:700;}
  @media (max-width:760px){
    body{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px;}
    .brand{display:none;}
    nav{flex-direction:row;padding:0;}
    .main{padding:16px;}
  }
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 24 24" fill="none"><path d="M9 2h6v4.2c0 .5.15.98.44 1.38L17.6 10.8c.26.36.4.8.4 1.24V20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-7.96c0-.44.14-.88.4-1.24l2.16-3.22c.29-.4.44-.88.44-1.38V2Z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/><path d="M7 15h10" stroke="#fff" stroke-width="1.6"/></svg>
    <div class="brand-text">DairyFlow<small>Distribution Manager</small></div>
  </div>
  <nav id="nav"></nav>
</div>
<div class="main"><div id="view"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- Constants ---------------- */
const SKUS = [
  {key:'milk_1l', label:'Milk (1 Litre)'},
  {key:'milk_500ml', label:'Milk (500 ml)'},
  {key:'curd', label:'Curd Packet'},
];
function skuLabel(key){ const s=SKUS.find(x=>x.key===key); return s?s.label:key; }

/* ---------------- Storage helpers ---------------- */
const STORE_SHARED = true;
async function loadCollection(key, fallback){
  try{ const res = await window.storage.get(key, STORE_SHARED); return res && res.value ? JSON.parse(res.value) : fallback; }
  catch(e){ return fallback; }
}
async function saveCollection(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), STORE_SHARED); }
  catch(e){ console.error('Save failed', key, e); showToast('Could not save — please retry'); }
}

let DB = { companies:[], stockEntries:[], shops:[], salespersons:[], trips:[], bills:[], payments:[] };
let currentView = 'dashboard';
let openForms = {};
let editingShopId = null;
let billForm = { date:null, shopId:'', salespersonId:'', items:[{sku:'milk_1l', qty:'', rate:''}] };
let tripForm = { date:null, salespersonId:'', items:[{sku:'milk_1l', companyId:'', carried:''}] };
let openTripEdit = {};
let ledgerShopId = null;

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const money = n => '₹' + (Number(n)||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const qty = n => (Number(n)||0).toLocaleString('en-IN');
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = d => new Date(d).toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------------- Derived data ---------------- */
function companyName(id){ const c = DB.companies.find(x=>x.id===id); return c ? c.name : '—'; }
function shopName(id){ const s = DB.shops.find(x=>x.id===id); return s ? s.name : '—'; }
function personName(id){ const p = DB.salespersons.find(x=>x.id===id); return p ? p.name : '—'; }
function shopById(id){ return DB.shops.find(x=>x.id===id); }

function stockReceived(companyId, sku){ return DB.stockEntries.filter(e=>e.companyId===companyId && e.sku===sku).reduce((s,e)=>s+Number(e.qty||0),0); }
function stockCarried(companyId, sku){ let sum=0; DB.trips.forEach(t=>t.items.forEach(it=>{ if(it.companyId===companyId && it.sku===sku) sum+=Number(it.carried||0); })); return sum; }
function stockReturned(companyId, sku){ let sum=0; DB.trips.forEach(t=>t.items.forEach(it=>{ if(it.companyId===companyId && it.sku===sku) sum+=Number(it.returned||0); })); return sum; }
function stockAvailable(companyId, sku){ return stockReceived(companyId,sku) - stockCarried(companyId,sku) + stockReturned(companyId,sku); }
function totalStockBySku(sku){ return DB.companies.reduce((s,c)=>s+stockAvailable(c.id,sku),0); }

function soldQty(salespersonId, date, sku){
  let sum=0;
  DB.bills.forEach(b=>{ if(b.salespersonId===salespersonId && b.date===date){ b.items.forEach(it=>{ if(it.sku===sku) sum+=Number(it.qty||0); }); } });
  return sum;
}
function totalDamagedToday(){ let s=0; DB.trips.forEach(t=>{ if(t.date===todayStr()) t.items.forEach(it=>s+=Number(it.damaged||0)); }); return s; }
function totalReturnedToday(){ let s=0; DB.trips.forEach(t=>{ if(t.date===todayStr()) t.items.forEach(it=>s+=Number(it.returned||0)); }); return s; }

function shopBilled(shopId){ return DB.bills.filter(b=>b.shopId===shopId).reduce((s,b)=>s+Number(b.total||0),0); }
function shopPaid(shopId){ return DB.payments.filter(p=>p.shopId===shopId).reduce((s,p)=>s+Number(p.amount||0),0); }
function shopBalance(shopId){ return shopBilled(shopId) - shopPaid(shopId); }
function totalOutstanding(){ return DB.shops.reduce((s,sh)=>s+shopBalance(sh.id),0); }
function totalBilledToday(){ return DB.bills.filter(b=>b.date===todayStr()).reduce((s,b)=>s+Number(b.total||0),0); }
function totalCollectedToday(){ return DB.payments.filter(p=>p.date===todayStr()).reduce((s,p)=>s+Number(p.amount||0),0); }
function balancePill(bal){ return bal<=0.001 ? `<span class="pill paid">Settled</span>` : `<span class="pill due">${money(bal)} due</span>`; }

/* ---------------- Nav ---------------- */
const NAV_ITEMS = [
  {id:'dashboard', label:'Dashboard', icon:'<path d="M3 13h7V3H3v10Zm0 8h7v-6H3v6Zm11 0h7V11h-7v10Zm0-18v6h7V3h-7Z"/>'},
  {id:'warehouse', label:'Warehouse & Companies', icon:'<path d="M3 9.5 12 4l9 5.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5Z"/><path d="M9 21v-7h6v7"/>'},
  {id:'shops', label:'Shops & Pricing', icon:'<path d="M4 9h16l-1.5-5h-13L4 9Z"/><path d="M5 9v10a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1V9"/>'},
  {id:'team', label:'Sales Team & Trips', icon:'<circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/>'},
  {id:'billing', label:'Distribution & Billing', icon:'<path d="M6 3h9l3 3v15H6V3Z"/><path d="M9 8h6M9 12h6M9 16h4"/>'},
  {id:'payments', label:'Collect Payment', icon:'<circle cx="12" cy="12" r="9"/><path d="M9 12h6M12 9v6"/>'},
  {id:'ledger', label:'Shop Ledger', icon:'<path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/>'},
];
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV_ITEMS.map(item => `
    <button data-view="${item.id}" class="${currentView===item.id?'active':''}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${item.icon}</svg>
      ${item.label}
    </button>`).join('');
  nav.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{ currentView = btn.dataset.view; render(); });
  });
}

function gaugeSvg(pct){
  pct = Math.max(0, Math.min(1, pct));
  const fillH = 90*pct;
  return `<svg width="60" height="100" viewBox="0 0 70 100">
    <defs><clipPath id="jugClip"><path d="M18 6h34v6l8 12v66a4 4 0 0 1-4 4H14a4 4 0 0 1-4-4V24l8-12V6Z"/></clipPath></defs>
    <path d="M18 6h34v6l8 12v66a4 4 0 0 1-4 4H14a4 4 0 0 1-4-4V24l8-12V6Z" fill="#fff" stroke="var(--border)" stroke-width="2"/>
    <g clip-path="url(#jugClip)"><rect x="4" y="${100-fillH}" width="62" height="${fillH}" fill="var(--primary)" opacity="0.85"/></g>
    <path d="M18 6h34v6l8 12v66a4 4 0 0 1-4 4H14a4 4 0 0 1-4-4V24l8-12V6Z" fill="none" stroke="var(--primary-dark)" stroke-width="2"/>
    <rect x="18" y="6" width="34" height="6" rx="1.5" fill="var(--primary-dark)"/>
  </svg>`;
}

/* ================= VIEWS ================= */
function viewDashboard(){
  const cap = SKUS.reduce((o,s)=>{o[s.key]=Math.max(totalStockBySku(s.key),1);return o;},{});
  return `
    <div class="page-header"><h1>Dashboard</h1><p>Live overview of stock, billing, collections and field reconciliation.</p></div>
    <div class="cards">
      <div class="card"><div class="label">Billed Today</div><div class="value">${money(totalBilledToday())}</div></div>
      <div class="card"><div class="label">Collected Today</div><div class="value gold">${money(totalCollectedToday())}</div></div>
      <div class="card"><div class="label">Total Outstanding</div><div class="value danger">${money(totalOutstanding())}</div><div class="sub">across ${DB.shops.length} shop(s)</div></div>
      <div class="card"><div class="label">Damaged Today</div><div class="value danger">${qty(totalDamagedToday())} pkts</div></div>
      <div class="card"><div class="label">Returned Today</div><div class="value">${qty(totalReturnedToday())} pkts</div></div>
    </div>
    <div class="panel">
      <h2>Stock in Hand (All Companies)</h2>
      <div style="display:flex;gap:26px;flex-wrap:wrap;">
      ${SKUS.map(s=>`
        <div class="gauge-wrap">
          ${gaugeSvg(0.6)}
          <div>
            <div style="font-size:19px;font-weight:700;color:var(--primary-dark);">${qty(totalStockBySku(s.key))}</div>
            <div style="font-size:12px;color:var(--muted);">${s.label} in warehouse</div>
          </div>
        </div>`).join('')}
      </div>
    </div>
    <div class="panel">
      <h2>Shops with Highest Balance Due</h2>
      ${DB.shops.length===0 ? '<div class="empty">No shops added yet.</div>' : `
      <table><thead><tr><th>Shop</th><th>Area</th><th>Billed</th><th>Paid</th><th>Balance</th></tr></thead>
      <tbody>${DB.shops.slice().sort((a,b)=>shopBalance(b.id)-shopBalance(a.id)).slice(0,6).map(s=>`
        <tr><td><strong>${escapeHtml(s.name)}</strong></td><td>${escapeHtml(s.area||'—')}</td>
        <td>${money(shopBilled(s.id))}</td><td>${money(shopPaid(s.id))}</td><td>${balancePill(shopBalance(s.id))}</td></tr>`).join('')}
      </tbody></table>`}
    </div>
  `;
}

function viewWarehouse(){
  return `
    <div class="page-header"><h1>Warehouse & Companies</h1><p>Track milk & curd received from each production company, and current stock per company.</p></div>

    <div class="panel">
      <h2>Production Companies <button class="toggle-btn" onclick="toggleForm('company')">${openForms.company?'Cancel':'+ Add Company'}</button></h2>
      <form class="inline-form ${openForms.company?'open':''}" onsubmit="submitCompany(event)">
        <div><label>Company Name</label><input type="text" name="name" placeholder="e.g. Al Ain Farms" required></div>
        <div class="form-actions"><button type="submit" class="primary">Save Company</button></div>
      </form>
      ${DB.companies.length===0 ? '<div class="empty">No companies added yet — add one before recording stock.</div>' : `
      <table class="stock-grid-table"><thead><tr><th>Company</th>${SKUS.map(s=>`<th>${s.label}</th>`).join('')}<th></th></tr></thead>
      <tbody>${DB.companies.map(c=>`
        <tr><td><strong>${escapeHtml(c.name)}</strong></td>
        ${SKUS.map(s=>`<td class="avail">${qty(stockAvailable(c.id,s.key))}</td>`).join('')}
        <td><button class="link-btn danger" onclick="deleteEntry('companies','${c.id}')">Remove</button></td></tr>`).join('')}
      </tbody></table>`}
    </div>

    <div class="panel">
      <h2>Stock Receipts <button class="toggle-btn" onclick="toggleForm('stock')">${openForms.stock?'Cancel':'+ Record Receipt'}</button></h2>
      <form class="inline-form ${openForms.stock?'open':''}" onsubmit="submitStock(event)">
        <div><label>Date</label><input type="date" name="date" value="${todayStr()}" required></div>
        <div><label>Company</label><select name="companyId" required><option value="">Select company</option>${DB.companies.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}</select></div>
        <div><label>Product</label><select name="sku" required>${SKUS.map(s=>`<option value="${s.key}">${s.label}</option>`).join('')}</select></div>
        <div><label>Quantity (packets)</label><input type="number" name="qty" min="0" required></div>
        <div class="full"><label>Note (optional)</label><input type="text" name="note" placeholder="Vehicle no, batch no, etc."></div>
        <div class="form-actions"><button type="submit" class="primary">Save Receipt</button></div>
      </form>
      ${DB.stockEntries.length===0 ? '<div class="empty">No stock received yet.</div>' : `
      <table><thead><tr><th>Date</th><th>Company</th><th>Product</th><th>Quantity</th><th>Note</th><th></th></tr></thead>
      <tbody>${DB.stockEntries.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`
        <tr><td>${fmtDate(e.date)}</td><td>${escapeHtml(companyName(e.companyId))}</td><td>${skuLabel(e.sku)}</td>
        <td><strong>${qty(e.qty)}</strong></td><td>${escapeHtml(e.note||'—')}</td>
        <td><button class="link-btn danger" onclick="deleteEntry('stockEntries','${e.id}')">Remove</button></td></tr>`).join('')}
      </tbody></table>`}
    </div>
  `;
}

function shopPriceForm(existing){
  const s = existing || {name:'',area:'',phone:'',address:'',prices:{}};
  return `
    <div><label>Shop Name</label><input type="text" name="name" value="${escapeHtml(s.name)}" required></div>
    <div><label>Area / Route</label><input type="text" name="area" value="${escapeHtml(s.area||'')}"></div>
    <div><label>Phone</label><input type="text" name="phone" value="${escapeHtml(s.phone||'')}"></div>
    <div class="full"><label>Address</label><input type="text" name="address" value="${escapeHtml(s.address||'')}"></div>
    ${SKUS.map(sku=>`<div><label>${sku.label} Price (₹)</label><input type="number" step="0.01" min="0" name="price_${sku.key}" value="${s.prices && s.prices[sku.key]!==undefined ? s.prices[sku.key] : ''}" placeholder="0.00"></div>`).join('')}
  `;
}

function viewShops(){
  const editing = editingShopId ? DB.shops.find(s=>s.id===editingShopId) : null;
  return `
    <div class="page-header"><h1>Shops & Pricing</h1><p>Each shop can have its own price per product — prices vary by area, quantity, and competition.</p></div>
    <div class="panel">
      <h2>${editing?('Edit — '+escapeHtml(editing.name)):'Shop Directory'} <button class="toggle-btn" onclick="toggleShopForm()">${openForms.shop?'Cancel':'+ Add Shop'}</button></h2>

function tripCard(t){
  const editing = !!openTripEdit[t.id];
  const rows = t.items.map((it,idx)=>{
    const sold = soldQty(t.salespersonId, t.date, it.sku);
    const balance = Number(it.carried||0) - sold - Number(it.returned||0) - Number(it.damaged||0);
    const balBadge = balance===0 ? `<span class="pill paid">0</span>` : (balance>0 ? `<span class="pill warn">${qty(balance)} in hand</span>` : `<span class="pill due">${qty(Math.abs(balance))} short</span>`);
    return `<tr>
      <td>${skuLabel(it.sku)}</td>
      <td>${escapeHtml(companyName(it.companyId))}</td>
      <td>${qty(it.carried)}</td>
      <td>${qty(sold)}</td>
      <td>${editing ? `<input class="small-input" type="number" min="0" value="${it.returned||0}" onchange="updateTripField('${t.id}',${idx},'returned',this.value)">` : qty(it.returned||0)}</td>
      <td>${editing ? `<input class="small-input" type="number" min="0" value="${it.damaged||0}" onchange="updateTripField('${t.id}',${idx},'damaged',this.value)">` : qty(it.damaged||0)}</td>
      <td>${balBadge}</td>
    </tr>`;
  }).join('');
  return `
    <div class="trip-card">
      <div class="trip-card-head">
        <div><span class="who">${escapeHtml(personName(t.salespersonId))}</span> <span class="when">— ${fmtDate(t.date)}</span></div>
        <button class="link-btn" onclick="toggleTripEdit('${t.id}')">${editing?'Done Editing':'Update Return / Damage'}</button>
      </div>
      <table><thead><tr><th>Product</th><th>Company</th><th>Carried</th><th>Sold</th><th>Returned</th><th>Damaged</th><th>Balance</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
}
